<!DOCTYPE html>

<html lang="vi"><head>

<style>
        .chunky-shadow {
            box-shadow: 0 4px 0 0 rgba(0, 0, 0, 0.1);
        }
        .btn-chunky-primary {
            box-shadow: 0 4px 0 0 #0e29cf;
        }
        .btn-chunky-primary:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 0 #0e29cf;
        }
        .btn-chunky-secondary {
            box-shadow: 0 4px 0 0 #c5c5d8;
        }
        .btn-chunky-secondary:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 0 #c5c5d8;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface-bright text-on-surface min-h-screen flex items-center justify-center p-0 md:p-8">
<main class="w-full max-w-[1200px] min-h-[700px] bg-surface-container-lowest flex flex-col md:flex-row overflow-hidden md:rounded-xl shadow-xl border border-surface-variant">
<!-- Left Column: Illustration -->
<section class="hidden md:flex md:w-1/2 relative bg-primary-container items-center justify-center p-12 overflow-hidden">
<!-- Background Decorative Elements -->
<div class="absolute inset-0 opacity-20 pointer-events-none">
<div class="absolute top-10 left-10 w-32 h-32 border-4 border-white rounded-full"></div>
<div class="absolute bottom-20 right-10 w-64 h-64 bg-secondary-container rounded-full blur-3xl opacity-30"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 font-label-code text-white text-[120px] font-bold opacity-10 select-none">print()</div>
</div>
<div class="relative z-10 flex flex-col items-center text-center">
<div class="w-full aspect-square max-w-[400px] bg-surface-container-low rounded-full p-8 chunky-shadow border-4 border-white mb-8 overflow-hidden flex items-center justify-center">
<img alt="Py-Bot Mascot" class="w-full h-full object-contain" data-alt="A friendly, high-tech robot character named Py-Bot with a sleek metallic body, glowing electric blue eyes, and a friendly wave. The robot is set against a vibrant, stylized digital space background with floating code snippets in Python, glowing nodes, and cosmic purple and blue nebulas. The illustration uses a modern, playful ed-tech style with clean lines, soft volumetric lighting, and bold primary colors to evoke excitement for learning." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4W4yro3Ao69fO9mvugy7WJ2x80WYW8ClcglnZ1wscTvZdpRqjENTInseCgmHetmfernXsDqVHm2dVQ7xMatuDGanvHGVum-838TejsV61zDpJ9OeWMEY2ehkTl3iRzUWJbtShpoIhRczplI8g5Mer3PwjPFv469wXvmoRudzKmA2tmZv0e8KeT5uTcMg_Vu0RS1m3udyk3jHF8dCE4oA6Z7WD0JuvH1A7PjdagTHCAVYSnoVQy3XUw0k2xvRg0cbthH10Gd7BZVqJ"/>
</div>
<h1 class="font-display-lg text-display-lg text-white mb-4">PythonQuest</h1>
<p class="font-body-lg text-body-lg text-primary-fixed leading-relaxed max-w-sm">
                    Khám phá thế giới của những dòng code và trở thành bậc thầy lập trình cùng Py-Bot!
                </p>
</div>
</section>
<!-- Right Column: Login Form -->
<section class="w-full md:w-1/2 flex flex-col justify-center items-center p-margin-mobile md:p-12 bg-white">
<div class="w-full max-w-[400px]">
<!-- Branding Mobile Only -->
<div class="md:hidden flex items-center gap-2 mb-8 justify-center">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="smart_toy">smart_toy</span>
<span class="font-headline-md text-headline-md text-primary font-bold tracking-tight">PythonQuest</span>
</div>
<!-- Header -->
<header class="mb-10 text-center md:text-left">
<h2 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">Chào mừng nhà thám hiểm!</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Sẵn sàng để tiếp tục cuộc hành trình lập trình của bạn?</p>
</header>
<!-- Form -->
<form class="space-y-6" onsubmit="return false;">
<!-- Username/Email Field -->
<div class="space-y-2">
<label class="font-headline-md text-body-md text-on-surface font-semibold ml-1" for="username">Email hoặc Tên đăng nhập</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="smart_toy">smart_toy</span>
</div>
<input class="block w-full h-[56px] pl-12 pr-4 bg-surface-container-lowest border-2 border-surface-variant rounded-xl focus:border-primary focus:ring-0 font-body-md text-on-surface transition-all placeholder:text-outline-variant" id="username" name="username" placeholder="Ví dụ: explorer_01" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-headline-md text-body-md text-on-surface font-semibold" for="password">Mật khẩu</label>
<a class="font-body-md text-body-md text-primary font-bold hover:underline" href="#">Quên mật khẩu?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="block w-full h-[56px] pl-12 pr-4 bg-surface-container-lowest border-2 border-surface-variant rounded-xl focus:border-primary focus:ring-0 font-body-md text-on-surface transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full h-[64px] bg-primary text-white font-headline-md text-headline-md rounded-xl btn-chunky-primary transition-transform flex items-center justify-center gap-2" type="submit">
<span>Bắt đầu thám hiểm</span>
<span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-surface-variant"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-4 bg-white font-body-md text-on-surface-variant">Hoặc đăng nhập bằng</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="h-[56px] bg-white border-2 border-surface-variant rounded-xl btn-chunky-secondary flex items-center justify-center gap-3 hover:bg-surface-container-low transition-all">
<img alt="Google" class="w-6 h-6" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAkccZawS2sDX8JfJFSyk6R4xO-BaWZ05VmDV1CCLfmSdM9eUuZqX_nuzLdDvsAppWPH9b3BdejbJhlGrVN1qVUWAraR1ui5fdGSPusrnWNoIWYlUPwIr-xWPIa9PXHsuB9YbNOgcYihQv8_mfXWX1vJ0PfqYltgy-l0edBuVpUteBwWqrjYMXiN8D3hpsvcKyRZrri68vCVOCd1HDrAHUjHpBmbybtZgA13_9-5Ha4sT2SFrkqeFtFr2c-JyBy-JSHQBXpFi6OayI8"/>
<span class="font-body-md text-on-surface font-bold">Google</span>
</button>
<button class="h-[56px] bg-white border-2 border-surface-variant rounded-xl btn-chunky-secondary flex items-center justify-center gap-3 hover:bg-surface-container-low transition-all">
<svg aria-hidden="true" class="w-6 h-6 text-[#24292e]" fill="currentColor" viewbox="0 0 24 24"><path clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.008.069-.008 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" fill-rule="evenodd"></path></svg>
<span class="font-body-md text-on-surface font-bold">Github</span>
</button>
</div>
<!-- Footer -->
<footer class="mt-10 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Chưa có tài khoản? 
                        <a class="text-primary font-bold hover:underline" href="#">Tham gia ngay!</a>
</p>
</footer>
</div>
</section>
</main>
</body></html>
